name = "blackrose-discord-sync"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Sync ROSE role → Supabase (every 15 minutes; POST /sync for immediate runs, POST /sync/boost optional).
[triggers]
crons = ["*/15 * * * *"]

[vars]
DISCORD_GUILD_ID = "1193921905795792906"
DISCORD_ROSE_ROLE_NAME = "ROSE"
SUPABASE_URL = "https://efchfvreaotskrdlweze.supabase.co"
SYNC_BATCH_SIZE = "22"
SYNC_BOOST_WINDOW_MINUTES = "10"
SYNC_BASELINE_INTERVAL_MINUTES = "15"
DISCORD_ROSE_ROLE_ID = "1465647773658517660"

[observability]
enabled = true
